<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoL Series Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    pointer-events: none;
  }

  /* ── Outer badge: horizontal pill hanging from top ── */
  .badge {
    position: absolute;
    top: 0;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    height: var(--badge-h);
  }

  #badge-left  { right: calc(1920px - var(--badge-left)); } /* dots on LEFT — anchored by right edge so it expands leftward */
  #badge-right { left: calc(1920px - var(--badge-right)); } /* dots on RIGHT — anchored by left edge so it expands rightward */

  /* ── Main body: team name + seed ── */
  .badge-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--inner-gap);
    padding: var(--pad-v) var(--pad-h);
    min-width: var(--main-min-w);
    position: relative;
    background: rgba(3, 10, 22, 1);
    border: 1px solid rgba(200,170,110,0.28);
    border-top: 1px solid rgba(200,170,110,0.55);
    border-bottom-color: rgba(200,170,110,0.18);
  }

  /* Gold shimmer line at very top */
  .badge-main::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,170,110,0.8), transparent);
  }

  /* Left badge: right border removed (dots panel butts up against it) */
  #badge-left  .badge-main { border-right: none; border-radius: 0 0 0 var(--radius); }
  #badge-right .badge-main { border-left:  none; border-radius: 0 0 var(--radius) 0; }

  .team-abbr {
    font-family: 'Cinzel', serif;
    font-size: var(--font-size);
    font-weight: 900;
    letter-spacing: var(--letter-spacing);
    line-height: 1;
    white-space: nowrap;
  }

  #badge-left  .team-abbr { color: #0bc4e3; text-shadow: 0 0 10px rgba(11,196,227,0.6); }
  #badge-right .team-abbr { color: #e84057; text-shadow: 0 0 10px rgba(232,64,87,0.6);  }

  .team-seed {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: var(--seed-size);
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1;
    white-space: nowrap;
    opacity: 0.5;
  }

  #badge-left  .team-seed { color: #0bc4e3; }
  #badge-right .team-seed { color: #e84057; }

  .team-seed:empty { display: none; }

  /* ── Dot column: narrow side panel ── */
  .badge-dots {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--dot-gap);
    padding: var(--pad-v) var(--dot-pad-h);
    background: rgba(2, 7, 18, 1);
    border: 1px solid rgba(200,170,110,0.28);
    border-top: 1px solid rgba(200,170,110,0.55);
    border-bottom-color: rgba(200,170,110,0.18);
    position: relative;
    min-width: var(--dot-col-w);
  }

  /* Divider line between main body and dot column */
  #badge-left  .badge-dots { border-right: none; border-radius: 0 0 var(--radius) 0; border-left: 1px solid rgba(200,170,110,0.35); }
  #badge-right .badge-dots { border-left:  none; border-radius: 0 0 0 var(--radius); border-right: 1px solid rgba(200,170,110,0.35); }

  .dot {
    width:  var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.07);
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }

  #badge-left  .dot.filled { background: #0bc4e3; border-color: #0bc4e3; box-shadow: 0 0 5px #0bc4e3, 0 0 12px rgba(11,196,227,0.5); }
  #badge-right .dot.filled { background: #e84057; border-color: #e84057; box-shadow: 0 0 5px #e84057, 0 0 12px rgba(232,64,87,0.5);  }

  /* ─── WIN BANNER ─── */
  #win-banner {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 99;
  }

  #win-banner.show {
    display: block;
    animation: winPop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes winPop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4) translateY(24px); }
    100% { opacity:1; transform:translate(-50%,-50%) scale(1)   translateY(0); }
  }

  .win-backing {
    position: absolute;
    inset: -60px -80px;
    background: radial-gradient(ellipse at center, rgba(0,8,20,0.82) 0%, transparent 70%);
  }

  .win-team {
    font-family: 'Cinzel', serif;
    font-size: 96px;
    font-weight: 900;
    letter-spacing: 14px;
    line-height: 1;
    text-shadow: 0 0 30px currentColor, 0 0 60px currentColor, 0 6px 12px rgba(0,0,0,0.9);
    animation: pulsate 1.2s ease-in-out infinite;
    position: relative;
  }

  @keyframes pulsate {
    0%,100% { opacity:1; }
    50%     { opacity:0.85; }
  }

  .win-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #c8aa6e;
    text-shadow: 0 0 20px rgba(200,170,110,0.8), 0 2px 6px rgba(0,0,0,0.9);
    margin-top: 10px;
    text-transform: uppercase;
    position: relative;
  }

  .win-deco {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-top: 8px; position: relative;
  }

  .win-deco-line { width: 70px; height: 1px; }
  #win-deco-l { background: linear-gradient(90deg,  transparent, rgba(200,170,110,0.6)); }
  #win-deco-r { background: linear-gradient(270deg, transparent, rgba(200,170,110,0.6)); }

  .win-deco-diamond {
    width: 5px; height: 5px;
    background: #c8aa6e;
    transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(200,170,110,0.8);
  }

  .win-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    margin-top: 4px;
    position: relative;
  }
</style>
</head>
<body>

  <!-- LEFT BADGE (dots on left, mirrored) -->
  <div class="badge" id="badge-left">
    <div class="badge-dots" id="left-dots"></div>
    <div class="badge-main">
      <div class="team-abbr" id="left-abbr"></div>
      <div class="team-seed"  id="left-seed"></div>
    </div>
  </div>

  <!-- RIGHT BADGE (dots on right) -->
  <div class="badge" id="badge-right">
    <div class="badge-main">
      <div class="team-abbr" id="right-abbr"></div>
      <div class="team-seed"  id="right-seed"></div>
    </div>
    <div class="badge-dots" id="right-dots"></div>
  </div>

  <!-- WIN BANNER -->
  <div id="win-banner">
    <div class="win-backing"></div>
    <div class="win-team" id="win-team-text"></div>
    <div class="win-sub"  id="win-sub-text">SERIES VICTORY</div>
    <div class="win-deco">
      <div class="win-deco-line" id="win-deco-l"></div>
      <div class="win-deco-diamond"></div>
      <div class="win-deco-line" id="win-deco-r"></div>
    </div>
    <div class="win-score" id="win-score-text"></div>
  </div>

<script>
  // =====================================================================
  //  CONFIGURATION
  // =====================================================================

  const SCALE       = 1.3;   // Overall size multiplier. 1.0 = default, 1.5 = 50% bigger
  const BADGE_LEFT  = 480;    // px from the LEFT  edge of screen
  const BADGE_RIGHT = 480;    // px from the RIGHT edge of screen

  // =====================================================================

  const SERVER = 'http://localhost:8765';

  const r = document.documentElement.style;
  r.setProperty('--badge-h',        `${44  * SCALE}px`);
  r.setProperty('--font-size',      `${16  * SCALE}px`);
  r.setProperty('--letter-spacing', `${2.5 * SCALE}px`);
  r.setProperty('--seed-size',      `${11  * SCALE}px`);
  r.setProperty('--dot-size',       `${8   * SCALE}px`);
  r.setProperty('--dot-gap',        `${5   * SCALE}px`);
  r.setProperty('--dot-pad-h',      `${10  * SCALE}px`);
  r.setProperty('--dot-col-w',      `${28  * SCALE}px`);
  r.setProperty('--inner-gap',      `${3   * SCALE}px`);
  r.setProperty('--pad-v',          `${6   * SCALE}px`);
  r.setProperty('--pad-h',          `${14  * SCALE}px`);
  r.setProperty('--main-min-w',     `${80  * SCALE}px`);
  r.setProperty('--radius',         `${5   * SCALE}px`);
  r.setProperty('--badge-left',     `${BADGE_LEFT}px`);
  r.setProperty('--badge-right',    `${BADGE_RIGHT}px`);

  // =====================================================================

  let lastTs = 0;
  let winnerTimer = null;

  function buildDots(id, score, winsNeeded) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 0; i < winsNeeded; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < score ? ' filled' : '');
      el.appendChild(d);
    }
  }

  function render(s) {
    const left  = s[s.leftTeam];
    const right = s[s.leftTeam === 'team1' ? 'team2' : 'team1'];

    document.getElementById('left-abbr').textContent  = left.abbr;
    document.getElementById('right-abbr').textContent = right.abbr;
    const fmtSeed = s => s ? (s.startsWith('#') ? s : '#' + s) : '';
    document.getElementById('left-seed').textContent  = fmtSeed(left.seed);
    document.getElementById('right-seed').textContent = fmtSeed(right.seed);

    buildDots('left-dots',  left.score,  s.winsNeeded);
    buildDots('right-dots', right.score, s.winsNeeded);

    if (s.showWinner && s.ts !== lastTs) showWinBanner(s.showWinner, s);
    lastTs = s.ts;
  }

  function showWinBanner(side, s) {
    const wk     = s.leftTeam === 'team1' ? (side === 'left' ? 'team1' : 'team2') : (side === 'left' ? 'team2' : 'team1');
    const winner = s[wk];
    const loser  = s[wk === 'team1' ? 'team2' : 'team1'];

    document.getElementById('win-team-text').textContent  = winner.abbr;
    document.getElementById('win-team-text').style.color  = side === 'left' ? '#0bc4e3' : '#e84057';
    document.getElementById('win-sub-text').textContent   = s.winsNeeded === 1 ? 'MATCH VICTORY' : 'SERIES VICTORY';
    document.getElementById('win-score-text').textContent = `${winner.score} – ${loser.score}`;

    const b = document.getElementById('win-banner');
    b.classList.remove('show');
    void b.offsetWidth;
    b.classList.add('show');

    if (winnerTimer) clearTimeout(winnerTimer);
    winnerTimer = setTimeout(() => b.classList.remove('show'), 4500);
  }

  async function poll() {
    try {
      const res = await fetch(`${SERVER}/state`);
      if (!res.ok) return;
      const s = await res.json();
      if (s.ts && s.ts !== lastTs) render(s);
    } catch(e) {}
  }

  setInterval(poll, 300);
  poll();
</script>
</body>
</html>
